<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podsumowanie zamówienia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='checkout.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1>Podsumowanie zamówienia</h1>

        <!-- Lista produktów w koszyku -->
        <h3>Produkty w Twoim koszyku:</h3>
        <ul>
            {% for product in products %}
            <li>{{ product }}</li>
            {% endfor %}
        </ul>

        <!-- Łączna cena zamówienia -->
        <h4>Łączna cena: {{ total_price }} zł</h4>

        <!-- Formularz do wpisania danych do zamówienia -->
        <form method="POST">
            <div class="mb-3">
                <label for="email" class="form-label">Adres e-mail</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="shipping_address" class="form-label">Imię i nazwisko</label>
                <textarea class="form-control" id="shipping_address" name="shipping_address" required></textarea>
            </div>

            <!-- Przycisk do złożenia zamówienia -->
            <button type="submit" class="btn btn-primary">Złóż zamówienie</button>
        </form>

        <!-- Przycisk powrotu do sklepu -->
        <a href="{{ url_for('index') }}" class="btn btn-secondary mt-3">Powrót do sklepu</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
