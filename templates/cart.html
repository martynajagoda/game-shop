<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koszyk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cart.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1>Twój koszyk</h1>

        {% if products %}
            <table class="table">
                <thead>
                    <tr>
                        <th>Nazwa produktu</th>
                        <th>Cena</th>
                        <th>Ilość</th>
                        <th>Akcje</th>
                    </tr>
                </thead>
                <tbody>
                    {% for product in products %}
                    <tr>
                        <td>{{ product.name }}</td>
                        <td>{{ product.price }} zł</td>
                        <td>
                            <div class="d-flex align-items-center">
                                <!-- Przycisk zmniejszenia ilości -->
                                <a href="{{ url_for('remove_from_cart', product_id=product.id) }}" class="btn btn-danger btn-sm">-</a>
                                <span class="mx-2">{{ product.quantity }}</span>
                                <!-- Przycisk zwiększenia ilości -->
                                <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn btn-success btn-sm">+</a>
                            </div>
                        </td>
                        <td>
                            <!-- Przycisk całkowitego usunięcia produktu -->
                            <a href="{{ url_for('remove_from_cart', product_id=product.id) }}" class="btn btn-danger">Usuń</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <a href="{{ url_for('checkout') }}" class="btn btn-primary">Przejdź do zamówienia</a>
        {% else %}
            <p>Twój koszyk jest pusty.</p>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Powrót do sklepu</a>
        {% endif %}

        <!-- Dodanie przycisku powrotu do menu głównego -->
        <a href="{{ url_for('index') }}" class="btn btn-secondary mt-3">Powrót do sklepu</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
